# ─────────────────────────────────────────────────────────────
# Wrangler configuration for local development and Pages bindings.
#
# This file is used by `wrangler pages dev` to emulate the
# Cloudflare Pages + Functions environment locally.
#
# This Pages project is also configured to manage bindings via
# `wrangler.toml`, so R2 bindings and non-secret vars declared here
# apply to deployments as well.
#
# Docs: https://developers.cloudflare.com/pages/functions/
# ─────────────────────────────────────────────────────────────

name = "c4-studio"
compatibility_date = "2024-12-01"

# Pages-specific settings
pages_build_output_dir = "dist"

[vars]
PUBLIC_BUCKET_URL = "https://pub-c3594a76834045cfa969981bd9da57db.r2.dev"

# ─── Environment variables (local dev only) ─────────────────
# Create a .dev.vars file for secrets (never committed to git):
#
#   RESEND_API_KEY=re_your_api_key_here
#   CONTACT_EMAIL=hello@c4studios.com
#   FROM_EMAIL=C4 Studios <noreply@c4studios.com>
#   ALLOWED_ORIGIN=http://localhost:8788
#
# See ENVIRONMENT.md for the full list.

# ─── R2 bucket binding ──────────────────────────────────────
[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "c4-uploads"
preview_bucket_name = "c4-uploads"
